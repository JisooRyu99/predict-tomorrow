name: 매일 문제 생성·배포

# 영업일(월~금) 16:00 KST = 07:00 UTC. 코스피 장 마감(15:30) 이후.
# 수동 실행도 가능 (Actions 탭 → Run workflow).
on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # state.json 커밋 푸시
  pages: write
  id-token: write

concurrency:
  group: daily-questions
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # 공개 API로 정답 확정 + 오늘 문제 생성 → site/today.json, state.json 갱신
      - name: Generate today.json
        run: node data-pipeline/generate.mjs

      # 갱신된 상태(state.json)를 main에 커밋해 다음 실행에서 채점 base로 사용
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-pipeline/state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push

      # today.json 을 GitHub Pages(gh-pages 브랜치)로 배포 → 앱이 이 URL을 fetch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
